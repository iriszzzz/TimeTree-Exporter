name: Sync TimeTree to iCal
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# 解決 Node 20 棄用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install TimeTree Exporter
        run: pip install timetree-exporter

      - name: Run Exporter
        env:
          # 這裡確保對應你在 Secrets 設定的名稱
          TIMETREE_COOKIE: ${{ secrets.TIMETREE_COOKIE }}
        run: |
          # 加上 --verbose 可以讓我們在失敗時看到更多訊息
          timetree-exporter -c ${{ secrets.CALENDAR_ID }} -o timetree.ics --verbose

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: .
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
