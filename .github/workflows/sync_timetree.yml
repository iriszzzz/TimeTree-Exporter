name: Sync TimeTree to iCal
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# 解決 Node 20 棄用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install TimeTree Exporter
        run: pip install timetree-exporter

      - name: Run Exporter
        env:
          TIMETREE_COOKIE: ${{ secrets.TIMETREE_COOKIE }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: |
          # 使用新的指令格式，強迫跳過 Email 詢問
          timetree-exporter -c "$CALENDAR_ID" -o timetree.ics --email "none" --token "$TIMETREE_COOKIE"
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: .
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
